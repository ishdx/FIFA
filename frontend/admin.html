<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>لوحة تحكم المشرف — مسابقة FIFA 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#1A1A1A;--red:#E01428;--red-light:#fce8ea;--green:#2E7D32;
  --bg:#f6f5f3;--surface:#fff;--surface2:#f0efec;
  --text:#1A1A1A;--text2:#5a5a56;--text3:#9a9a94;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);--rad:9px}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI",Tahoma,Arial,sans-serif;min-height:100vh}
.header{background:var(--brand);padding:14px 24px;display:flex;align-items:center;gap:14px}
.header img{height:40px;object-fit:contain;}
.header h1{font-size:16px;font-weight:600;color:#fff}
.header-right{margin-right:auto;display:flex;align-items:center;gap:10px}
.badge-admin{background:var(--red);color:#fff;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600}
.logout-btn{background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:var(--rad);padding:4px 12px;cursor:pointer;font-size:12px}
.logout-btn:hover{background:rgba(255,255,255,0.1)}
.main{max-width:960px;margin:0 auto;padding:24px 20px}
/* login */
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);
  padding:36px;max-width:380px;margin:60px auto;text-align:center}
.login-box h2{font-size:18px;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--text2);margin-bottom:24px}
.login-box input{width:100%;padding:10px 13px;border:1px solid var(--border2);border-radius:var(--rad);
  font-size:14px;font-family:inherit;margin-bottom:12px;background:var(--surface2);color:var(--text);display:block}
.login-box input:focus{outline:2px solid var(--red);outline-offset:1px}
.btn{padding:9px 20px;border:none;border-radius:var(--rad);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn-red{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-gray{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-sm{padding:5px 12px;font-size:12px}
.login-err{color:var(--red);font-size:12px;margin-top:10px;min-height:18px}
/* sections */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:20px 22px;margin-bottom:16px}
.sec-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;padding-right:10px;border-right:3px solid var(--red);display:flex;align-items:center;justify-content:space-between}
/* stats */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:12px 14px;text-align:center}
.stat-box .sval{font-size:24px;font-weight:700}
.stat-box .slbl{font-size:11px;color:var(--text2);margin-top:3px}
/* matches table */
.matches-filter{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.matches-filter button{padding:5px 13px;border:1px solid var(--border2);border-radius:var(--rad);
  background:var(--surface2);color:var(--text);cursor:pointer;font-family:inherit;font-size:12px}
.matches-filter button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:8px 10px;border-bottom:2px solid var(--border2);color:var(--text2);font-weight:600;font-size:11px;text-align:right}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2)}
.status-done{background:#e8f5e9;color:#2E7D32;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600}
.status-pending{background:#fff3e0;color:#E65100;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600}
/* result select inline */
.result-sel{padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rad);
  background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;min-width:180px}
.result-sel:focus{outline:2px solid var(--red)}
/* search participant */
.search-row{display:flex;gap:9px;margin-bottom:14px}
.search-row input{flex:1;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--rad);
  background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit}
.detail-box{background:var(--surface2);border-radius:var(--rad);padding:16px;font-size:13px}
.detail-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.detail-tbl th{padding:6px 8px;border-bottom:1px solid var(--border2);color:var(--text2);text-align:right;font-size:11px}
.detail-tbl td{padding:5px 8px;border-bottom:1px solid var(--border)}
.correct{color:#2E7D32;font-weight:600}
.wrong{color:var(--red)}
/* bonus input */
.bonus-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.bonus-row input{width:80px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--rad);
  font-size:13px;font-family:inherit;background:var(--surface);color:var(--text)}
/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;
  padding:10px 22px;border-radius:var(--rad);font-size:13px;z-index:1000;opacity:0;
  transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:600px){.stats-strip{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <img src="/logo.png" alt="SMI" style="height:56px;width:auto;flex-shrink:0;">
  <h1>لوحة تحكم المشرف</h1>
  <div class="header-right">
    <span id="admin-label" class="badge-admin" style="display:none">ADMIN</span>
    <button class="logout-btn" id="logout-btn" style="display:none" onclick="logout()">تسجيل الخروج</button>
  </div>
</div>

<div class="main">

<!-- LOGIN -->
<div id="login-section" class="login-box">
  <h2>🔐 تسجيل الدخول</h2>
  <p>لوحة تحكم المشرف</p>
  <input type="text" id="uname" placeholder="اسم المستخدم" autocomplete="username">
  <input type="password" id="upass" placeholder="كلمة المرور" autocomplete="current-password"
    onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn btn-red" style="width:100%" onclick="doLogin()">دخول</button>
  <div id="login-err" class="login-err"></div>
</div>

<!-- DASHBOARD -->
<div id="admin-dashboard" style="display:none">

  <div class="stats-strip" id="stats-strip"></div>
  <div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-red" onclick="recalcPoints()">🔄 إعادة حساب النقاط</button>
    <button class="btn btn-green" onclick="exportFile('excel')">📊 تصدير Excel</button>
    <button class="btn btn-gray" onclick="exportFile('pdf')">📄 تصدير PDF</button>
    <span id="recalc-msg" style="font-size:13px;color:var(--green);align-self:center"></span>
  </div>

  <!-- ALL MATCHES -->
  <div class="section">
    <div class="sec-title">
      <span>📋 جميع المباريات</span>
      <button class="btn btn-gray btn-sm" onclick="loadAllMatches()">🔄 تحديث</button>
    </div>
    <div class="matches-filter">
      <button class="active" onclick="filterMatches('all',this)">الكل</button>
      <button onclick="filterMatches('1',this)">الجولة 1</button>
      <button onclick="filterMatches('2',this)">الجولة 2</button>
      <button onclick="filterMatches('3',this)">الجولة 3</button>
      <button onclick="filterMatches('4',this)">دور الـ32</button>
      <button onclick="filterMatches('done',this)">مكتملة ✅</button>
      <button onclick="filterMatches('pending',this)">منتظرة ⏳</button>
    </div>
    <div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr>
          <th style="width:36px;text-align:center">ج</th>
          <th>المباراة</th>
          <th style="width:220px">النتيجة</th>
          <th style="width:90px;text-align:center">الحالة</th>
          <th style="width:80px;text-align:center">حفظ</th>
        </tr></thead>
        <tbody id="all-matches-body"></tbody>
      </table>
    </div>
  </div>

  <!-- PARTICIPANT SEARCH -->
  <div class="section">
    <div class="sec-title">🔍 تفاصيل مشارك وإضافة نقاط مكافأة</div>
    <div class="search-row">
      <input type="text" id="emp-search" placeholder="ابحث بالرقم الوظيفي أو الاسم..." onkeydown="if(event.key==='Enter')searchParticipant()">
      <button class="btn btn-red" onclick="searchParticipant()">بحث</button>
    </div>
    <div id="participant-detail"></div>
  </div>

</div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = '';
let AUTH_TOKEN = localStorage.getItem('admin_token') || '';

function makeToken(u, p) {
  return btoa(unescape(encodeURIComponent(u + ':' + p)));
}

function authHeaders() {
  return { 'X-Admin-Token': AUTH_TOKEN, 'Content-Type': 'application/json' };
}

async function doLogin() {
  const u = document.getElementById('uname').value.trim();
  const p = document.getElementById('upass').value;
  if (!u || !p) { document.getElementById('login-err').textContent = 'أدخل اسم المستخدم وكلمة المرور'; return; }
  const token = makeToken(u, p);
  const res = await fetch(API + '/api/admin/verify', { headers: { 'X-Admin-Token': token } });
  if (res.status === 401) {
    document.getElementById('login-err').textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
    return;
  }
  AUTH_TOKEN = token;
  localStorage.setItem('admin_token', token);
  showDashboard();
}

async function autoLogin() {
  if (!AUTH_TOKEN) return;
  const res = await fetch(API + '/api/admin/verify', { headers: { 'X-Admin-Token': AUTH_TOKEN } });
  if (res.ok) showDashboard();
  else { AUTH_TOKEN = ''; localStorage.removeItem('admin_token'); }
}

function showDashboard() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('admin-dashboard').style.display = 'block';
  document.getElementById('admin-label').style.display = 'inline-block';
  document.getElementById('logout-btn').style.display = 'inline-block';
  loadAll();
}

function logout() {
  AUTH_TOKEN = '';
  localStorage.removeItem('admin_token');
  location.reload();
}

function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#b50f1f' : '#1A1A1A';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

async function loadStats() {
  const res = await fetch(API + '/api/stats');
  const s = await res.json();
  document.getElementById('stats-strip').innerHTML = `
    <div class="stat-box"><div class="sval">${s.total_participants}</div><div class="slbl">إجمالي المشاركين</div></div>
    <div class="stat-box"><div class="sval" style="color:var(--red)">${s.leader.total}</div><div class="slbl">أعلى نقاط — ${s.leader.name.split(' ')[0]||'—'}</div></div>
    <div class="stat-box"><div class="sval" style="color:#2E7D32">${s.matches_done}</div><div class="slbl">مباراة مُسجَّلة</div></div>
    <div class="stat-box"><div class="sval">${s.matches_pending}</div><div class="slbl">مباراة منتظرة</div></div>`;
}

let allMatchesData = [];

async function loadAllMatches() {
  const res = await fetch(API + '/api/matches');
  allMatchesData = await res.json();
  renderMatches(document.querySelector('.matches-filter button.active')?.dataset?.filter || 'all');
}

function filterMatches(filter, btn) {
  document.querySelectorAll('.matches-filter button').forEach(b => b.classList.remove('active'));
  if (btn) { btn.classList.add('active'); btn.dataset.filter = filter; }
  renderMatches(filter);
}

function renderMatches(filter) {
  let data = allMatchesData;
  if (filter === 'done') data = data.filter(m => m.status === 'done');
  else if (filter === 'pending') data = data.filter(m => m.status === 'pending');
  else if (['1','2','3'].includes(filter)) data = data.filter(m => String(m.round) === filter);

  const tbody = document.getElementById('all-matches-body');
  tbody.innerHTML = data.map(m => {
    const isDone = m.status === 'done';
    const badge = isDone
      ? `<span class="status-done">✅ مكتملة</span>`
      : `<span class="status-pending">⏳ منتظرة</span>`;
    // Build dropdown from stored options
    const opts = (m.options || []).map(o =>
      `<option value="${o.replace(/"/g,'&quot;')}" ${o===m.result?'selected':''}>${o}</option>`
    ).join('');
    const sel = `<select class="result-sel" id="sel-${m.id}">
      <option value="">— اختر النتيجة —</option>${opts}
    </select>`;
    return `<tr>
      <td style="text-align:center;font-weight:600">${m.round === 4 ? "R32" : m.round}</td>
      <td style="font-size:13px">${m.match_name}</td>
      <td>${sel}</td>
      <td style="text-align:center">${badge}</td>
      <td style="text-align:center">
        <button class="btn btn-red btn-sm" onclick="saveResult(${m.id},${m.round},'${m.match_name.replace(/'/g,"\'")}')">حفظ ✓</button>
      </td>
    </tr>`;
  }).join('');
}

async function saveResult(id, round, matchName) {
  const sel = document.getElementById('sel-' + id);
  const result = sel.value;
  if (!result) { showToast('اختر النتيجة أولاً', true); return; }
  const btn = sel.closest('tr').querySelector('button');
  btn.disabled = true; btn.textContent = '...';
  const res = await fetch(API + '/api/admin/result', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ round, match_name: matchName, result })
  });
  if (res.ok) {
    showToast(`✅ ${matchName} — ${result}`);
    await loadAll();
  } else {
    const err = await res.json();
    showToast('خطأ: ' + (err.detail || 'حاول مجدداً'), true);
    btn.disabled = false; btn.textContent = 'حفظ ✓';
  }
}

async function searchParticipant() {
  const q = document.getElementById('emp-search').value.trim();
  if (!q) return;
  const lbRes = await fetch(API + `/api/leaderboard?search=${encodeURIComponent(q)}&per_page=5`);
  const lb = await lbRes.json();
  if (!lb.data.length) {
    document.getElementById('participant-detail').innerHTML = '<p style="color:var(--red);font-size:13px;padding:10px 0">لم يُعثر على المشارك</p>';
    return;
  }
  const emp_id = lb.data[0].emp_id;
  const res = await fetch(API + `/api/admin/participant/${emp_id}`, { headers: authHeaders() });
  const p = await res.json();
  const rows = p.predictions.map(pr => `<tr>
    <td>ج${pr.round}</td>
    <td style="font-size:12px">${pr.match}</td>
    <td style="font-size:12px">${pr.prediction||'—'}</td>
    <td style="font-size:12px">${pr.result||'—'}</td>
    <td class="${pr.correct===true?'correct':pr.correct===false?'wrong':''}">${pr.correct===true?'✅ +3':pr.correct===false?'❌ 0':'—'}</td>
  </tr>`).join('');

  document.getElementById('participant-detail').innerHTML = `
    <div class="detail-box">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <strong style="font-size:15px">${p.name}</strong>
          <span style="color:var(--text2);margin-right:10px;font-size:12px">رقم: ${p.emp_id}</span>
        </div>
        <div style="font-size:13px;display:flex;gap:16px;flex-wrap:wrap">
          <span>ج1: <strong style="color:#1565C0">${p.r1_pts}</strong></span>
          <span>ج2: <strong style="color:#2E7D32">${p.r2_pts}</strong></span>
          <span>ج3: <strong style="color:var(--red)">${p.r3_pts}</strong></span>
          <span>مكافأة: <strong style="color:#7B1FA2">${p.bonus_pts}</strong></span>
          <span style="font-size:15px;font-weight:700;color:var(--red)">الإجمالي: ${p.total}</span>
        </div>
      </div>
      <div class="bonus-row">
        <label style="font-size:13px;font-weight:600">نقاط مكافأة يدوية:</label>
        <input type="number" id="bonus-input" value="${p.bonus_pts}" min="0" step="1" placeholder="0">
        <button class="btn btn-green btn-sm" onclick="saveBonus('${p.emp_id}')">حفظ المكافأة</button>
        <span style="font-size:11px;color:var(--text3)">تُضاف على النقاط التلقائية</span>
      </div>
      <table class="detail-tbl">
        <thead><tr><th>الجولة</th><th>المباراة</th><th>التوقع</th><th>النتيجة</th><th>النقاط</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function saveBonus(emp_id) {
  const val = parseFloat(document.getElementById('bonus-input').value) || 0;
  const res = await fetch(API + '/api/admin/bonus', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ emp_id, bonus_pts: val })
  });
  if (res.ok) {
    showToast(`✅ تم حفظ ${val} نقطة مكافأة`);
    await loadStats();
    await searchParticipant();
  } else {
    showToast('خطأ في حفظ المكافأة', true);
  }
}

async function loadAll() {
  await loadStats();
  await loadAllMatches();
}

// Auto-login if token saved
autoLogin();

async function recalcPoints() {
  const btn = document.querySelector('[onclick="recalcPoints()"]');
  const msg = document.getElementById('recalc-msg');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الحساب...';
  msg.textContent = '';
  const res = await fetch(API + '/api/admin/recalculate', {
    method: 'POST',
    headers: authHeaders()
  });
  const data = await res.json();
  if (res.ok) {
    msg.textContent = '✅ تم إعادة الحساب بنجاح';
    showToast('✅ تمت إعادة حساب نقاط جميع المشاركين');
    await loadStats();
  } else {
    msg.textContent = '❌ حدث خطأ';
    showToast('خطأ: ' + (data.detail || 'حاول مجدداً'), true);
  }
  btn.disabled = false;
  btn.textContent = '🔄 إعادة حساب النقاط';
}

async function exportFile(type) {
  const btn = event.target;
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '⏳ جاري التصدير...';
  try {
    const res = await fetch(API + '/api/admin/export/' + type, {
      headers: { 'X-Admin-Token': AUTH_TOKEN }
    });
    if (!res.ok) {
      const err = await res.json();
      showToast('خطأ: ' + (err.detail || 'فشل التصدير'), true);
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const cd = res.headers.get('Content-Disposition') || '';
    const fname = cd.match(/filename="([^"]+)"/)?.[1] || ('leaderboard.' + type);
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✅ تم التصدير بنجاح: ' + fname);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

</script>
</body>
</html>
